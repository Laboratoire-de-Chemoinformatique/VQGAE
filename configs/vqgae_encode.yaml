seed_everything: 42
trainer:
  accelerator: 'gpu'
  devices: [0]
model:
  max_atoms: 51
  batch_size: 500
  num_conv_layers: 5
  vector_dim: 512
  num_mha_layers: 10
  num_agg_layers: 2
  num_heads_encoder: 16
  num_heads_decoder: 16
  dropout: 0.0
  bias: true
  init_values: 0.0005
  lr: 0.0002
  task: encode
  shuffle_graph: false
  positional_bias: false
  reparam: false
  class_categories: [38, 29, 21, 25, 16, 13, 50, 13]
data:
  # Edit these paths to point at your SDF + scratch dir before running.
  path_train_predict: ./data/molecules.sdf
  tmp_folder: ./tmp/
  tmp_name: encode
encoder_writer:
  output_name: encoded
  output_dir: ./outputs
  use_chunks: true
  chunk_size: 400
# Path to the .ckpt produced by `vqgae_train fit` (or downloaded from
# https://huggingface.co/tagirshin/VQGAE).
ckpt_model_file: ./vqgae.ckpt